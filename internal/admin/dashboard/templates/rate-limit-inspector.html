{{define "rate-limit-inspector"}}
<!-- Effective rate limits for one model or provider: the subject's own rules
     plus the provider and global rules that also throttle its traffic. -->
<div class="editor-modal-backdrop"
     x-cloak
     x-show="rateLimitInspectorOpen"
     x-transition.opacity.duration.160ms
     aria-hidden="true"></div>
<div class="editor-modal-shell"
     x-cloak
     x-show="rateLimitInspectorOpen"
     x-transition.opacity.duration.160ms
     @click="closeRateLimitInspector()"
     @keydown.escape.window="rateLimitInspectorOpen && !authDialogOpen && closeRateLimitInspector()">
    <div class="model-editor budget-editor" x-show="rateLimitInspectorOpen" role="dialog" aria-modal="true" aria-label="Effective rate limits" @click.stop>
        <div class="editor-header">
            <div>
                <h3>Rate Limits</h3>
                <p class="form-hint"><code class="mono" x-text="rateLimitInspector.title"></code></p>
            </div>
            <button type="button" class="dialog-close-btn" aria-label="Close rate limits inspector" @click="closeRateLimitInspector()">
                {{template "x-icon"}}
            </button>
        </div>

        <div class="loading-state" x-show="rateLimitsLoading">
            <div class="loading-spinner"></div>
            <span>Loading rate limits...</span>
        </div>
        <div class="alert alert-warning" x-show="!rateLimitsLoading && !rateLimitsAvailable">
            Rate limit management is unavailable.
        </div>

        <template x-for="section in rateLimitInspectorSections()" :key="section.key">
            <section class="form-section" x-show="!rateLimitsLoading && rateLimitsAvailable">
                <div class="inline-help-title-row">
                    <h4 class="form-field-label" x-text="section.title"></h4>
                    <button type="button"
                            class="table-action-btn budget-action-btn"
                            :aria-label="'Add ' + section.title.toLowerCase()"
                            :title="'Add ' + section.title.toLowerCase()"
                            @click="openRateLimitFormFromInspector(section.scope, section.subject)">
                        {{template "plus-icon"}}
                        <span class="budget-action-label">Add</span>
                    </button>
                </div>
                <p class="form-hint" x-show="section.hint" x-text="section.hint"></p>
                <p class="empty-state" x-show="section.items.length === 0">No rules.</p>
                <div class="budget-list" x-show="section.items.length > 0">
                    <template x-for="item in section.items" :key="rateLimitKey(item)">
                        <section class="budget-row"
                                 :class="rateLimitPressureClass(item)"
                                 :style="rateLimitPressureStyle(item)"
                                 :title="rateLimitPressurePercent(item) + '% of the most constrained cap used'">
                            <div class="budget-row-main">
                                <div class="budget-row-head">
                                    <code class="budget-user-path" x-text="rateLimitSubject(item)"></code>
                                    <div class="budget-row-period">
                                        <span class="budget-period-label">
                                            <i :data-lucide="rateLimitIsConcurrent(item) ? 'activity' : 'timer'" class="budget-period-icon" aria-hidden="true"></i>
                                            <span x-text="rateLimitPeriodLabel(item)"></span>
                                        </span>
                                    </div>
                                    <div class="budget-row-controls">
                                        <div class="budget-row-meta">
                                            <span class="budget-source" x-text="rateLimitInspectorSummary(item)"></span>
                                            <span class="budget-source"
                                                  x-text="rateLimitSourceLabel(item)"
                                                  :title="rateLimitIsReadOnly(item) ? 'Declared in configuration; read-only in the dashboard' : 'Managed via dashboard or admin API'"></span>
                                        </div>
                                        <div class="budget-row-actions">
                                            <button type="button"
                                                    class="table-action-btn budget-action-btn"
                                                    x-show="!rateLimitIsReadOnly(item)"
                                                    title="Edit rate limit"
                                                    aria-label="Edit rate limit"
                                                    @click="openRateLimitFormFromInspector(null, null, item)">
                                                <i data-lucide="pencil" class="budget-action-icon" aria-hidden="true"></i>
                                                <span class="budget-action-label">Edit</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </template>
                </div>
            </section>
        </template>

        <div class="form-actions">
            <button type="button" class="pagination-btn" @click="closeRateLimitInspector()">Close</button>
            <button type="button" class="pagination-btn" x-show="rateLimitsEnabled()" @click="closeRateLimitInspector(); navigate('rate-limits')">Open Rate Limits page</button>
        </div>
    </div>
</div>
{{end}}
