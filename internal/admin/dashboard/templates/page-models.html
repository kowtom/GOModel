{{define "dashboard-page-models"}}
<!-- Models Page -->
<template x-if="page==='models'">
<div>
    <div class="page-header">
        <h2>Registered Models</h2>
        <div class="model-count" x-show="displayModels.length > 0">
            <span x-text="modelFilter ? filteredDisplayModels.length + ' / ' + displayModels.length : displayModels.length"></span> models
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}
    <div class="alert alert-warning" x-show="!virtualModelsAvailable && !authError">
        Virtual models feature is unavailable.
    </div>
    <div class="alert alert-warning" x-show="aliasError && !authError && !vmFormOpen" x-text="aliasError"></div>
    <div class="alert alert-success" x-show="aliasNotice" x-text="aliasNotice"></div>
    <div class="alert alert-warning" x-show="modelPricingOverrideError && !authError && !modelPricingOverrideFormOpen" x-text="modelPricingOverrideError"></div>
    <div class="alert alert-success" x-show="modelPricingOverrideNotice && !modelPricingOverrideError" x-text="modelPricingOverrideNotice"></div>

    <!-- Category Tabs -->
    <div class="category-tabs" x-show="categories.length > 0">
        <template x-for="cat in categories" :key="cat.category">
            <button type="button" class="category-tab" :class="{ active: activeCategory === cat.category }" @click="selectCategory(cat.category)">
                <span x-text="cat.display_name"></span>
                <span class="tab-count" x-text="cat.count"></span>
            </button>
        </template>
    </div>

    <!-- Filter -->
    <div class="table-toolbar" x-show="displayModels.length > 0 || modelFilter || virtualModelsAvailable">
        <div class="table-toolbar-main">
            <div class="filter-input-wrap">
                <i data-lucide="search" class="filter-input-icon" aria-hidden="true"></i>
                <input type="text" placeholder="Filter by provider, provider/model, alias, or owner..." aria-label="Filter models by provider, provider/model, alias, or owner" x-model="modelFilter" class="filter-input">
            </div>
        </div>
        <div class="table-toolbar-actions">
            <button type="button" class="pagination-btn pagination-btn-primary pagination-btn-with-icon alias-create-btn" x-show="virtualModelsAvailable" @click="openVirtualModelCreate()">
                <i data-lucide="plus" class="alias-create-icon" aria-hidden="true"></i>
                <span>Create&nbsp;Alias</span>
            </button>
        </div>
    </div>

    <div class="loading-state" x-show="modelsLoading && !authError" role="status" aria-live="polite">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span x-text="displayModels.length > 0 ? 'Refreshing models...' : 'Loading models...'"></span>
    </div>

    <div class="editor-modal-backdrop"
         x-cloak
         x-show="vmFormOpen"
         x-transition.opacity.duration.160ms
         aria-hidden="true"></div>
    <div class="editor-modal-shell"
         x-cloak
         x-show="vmFormOpen"
         x-transition.opacity.duration.160ms
         @click="closeVirtualModelForm()"
         @keydown.escape.window="vmFormOpen && !authDialogOpen && closeVirtualModelForm()">
        <div class="model-editor" x-show="vmFormOpen" x-ref="virtualModelEditor" role="dialog" aria-modal="true" aria-label="Virtual model editor" @click.stop>
            <form class="form" @submit.prevent="submitVirtualModelForm()">
                <div class="editor-header">
                    <div>
                        <p class="form-kicker" x-text="vmFormMode === 'edit' ? 'Edit virtual model' : 'New virtual model'"></p>
                        <h3 x-text="vmFormDisplayName || vmForm.source || 'Virtual model'"></h3>
                    </div>
                    <button type="button" class="dialog-close-btn" aria-label="Close virtual model editor" @click="closeVirtualModelForm()">
                        {{template "x-icon"}}
                    </button>
                </div>

                <div class="form-grid">
                    <div class="form-field">
                        <label class="form-field-label" for="virtual-model-source">Source</label>
                        <input id="virtual-model-source" type="text" class="mono" placeholder="smart" x-model="vmForm.source" :disabled="vmFormSourceLocked" data-modal-autofocus>
                    </div>

                    <div class="form-field">
                        <label class="form-field-label" for="virtual-model-target">Target model</label>
                        <input id="virtual-model-target" type="text" list="virtual-model-target-options" class="mono" placeholder="openai/gpt-4o" x-model="vmForm.target_model">
                    </div>
                </div>

                <datalist id="virtual-model-target-options">
                    <template x-for="m in models" :key="qualifiedModelName(m)">
                        <option :value="qualifiedModelName(m)" x-text="qualifiedModelName(m)"></option>
                    </template>
                </datalist>

                <p class="form-hint">
                    Fill <strong>Target model</strong> to make this a redirect/alias; leave it empty to make it an access policy on the <code>Source</code> selector. The selector uses <code>/</code> for all providers and models, <code>{provider_name}/</code> for one provider, or <code>{provider_name}/{model}</code> for one model. <code>user_paths</code> is matched against the effective request <code>user_path</code>: the managed API key <code>user_path</code> when present, otherwise the configured user path request header.
                </p>
                <p class="form-hint" x-show="vmFormMode === 'edit'" x-text="'Default enabled: ' + (vmFormDefaultEnabled ? 'yes' : 'no') + ' · Effective now: ' + (vmFormEffectiveEnabled ? 'yes' : 'no')"></p>

                <div class="form-field">
                    <label class="form-field-label" for="virtual-model-user-paths">User Paths</label>
                    <textarea id="virtual-model-user-paths" rows="4" class="mono" placeholder="/&#10;/team/alpha&#10;/non-existing" x-model="vmForm.user_paths"></textarea>
                </div>

                <p class="form-hint">
                    Use <code>/</code> to allow every user path. Use a team path to restrict to that subtree, or an unused path to make the selector unavailable.
                </p>

                <div class="form-field">
                    <label class="form-field-label" for="virtual-model-description">Description</label>
                    <textarea id="virtual-model-description" rows="3" placeholder="Optional description" x-model="vmForm.description"></textarea>
                </div>

                <div class="form-field">
                    <span class="form-field-label">Status</span>
                    <div>
                        <button type="button" class="alias-toggle"
                                :class="{ enabled: vmForm.enabled, restricted: vmFormToggleRestricted() }"
                                :aria-label="(vmForm.enabled ? 'Disable' : 'Enable') + ' virtual model'"
                                @click="vmForm.enabled = !vmForm.enabled">
                            <span class="alias-toggle-track"><span class="alias-toggle-thumb"></span></span>
                            <span x-text="vmFormToggleLabel()"></span>
                        </button>
                    </div>
                </div>

                <p class="form-error" x-show="vmFormError" x-text="vmFormError" role="alert" aria-live="assertive"></p>

                <div class="form-actions">
                    <button type="button" class="pagination-btn" @click="closeVirtualModelForm()">Cancel</button>
                    <button type="button" class="pagination-btn pagination-btn-danger-outline" x-show="vmFormHasExisting" :disabled="vmDeleting || vmSubmitting" @click="deleteVirtualModel()">Remove</button>
                    <button type="submit" class="pagination-btn pagination-btn-primary pagination-btn-with-icon virtual-model-submit-btn" :disabled="vmSubmitting || vmDeleting">
                        <i data-lucide="plus" class="form-action-icon" x-show="vmFormMode !== 'edit'" aria-hidden="true"></i>
                        <i data-lucide="save" class="form-action-icon" x-show="vmFormMode === 'edit'" aria-hidden="true"></i>
                        <span x-text="vmSubmitting ? 'Saving...' : (vmFormMode === 'edit' ? 'Save' : 'Create')"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="editor-modal-backdrop"
         x-cloak
         x-show="modelPricingOverrideFormOpen"
         x-transition.opacity.duration.160ms
         aria-hidden="true"></div>
    <div class="editor-modal-shell"
         x-cloak
         x-show="modelPricingOverrideFormOpen"
         x-transition.opacity.duration.160ms
         @click="closeModelPricingOverrideForm()"
         @keydown.escape.window="modelPricingOverrideFormOpen && !authDialogOpen && closeModelPricingOverrideForm()">
        <div class="model-editor model-pricing-editor" x-show="modelPricingOverrideFormOpen" x-ref="modelPricingOverrideEditor" role="dialog" aria-modal="true" aria-label="Model pricing editor" @click.stop>
            <form class="form" @submit.prevent="submitModelPricingOverrideForm()">
                <div class="editor-header">
                    <div>
                        <p class="form-kicker">Pricing override</p>
                        <h3 x-text="modelPricingOverrideFormDisplayName || modelPricingOverrideForm.selector || 'Pricing'"></h3>
                    </div>
                    <button type="button" class="dialog-close-btn" aria-label="Close model pricing editor" @click="closeModelPricingOverrideForm()">
                        {{template "x-icon"}}
                    </button>
                </div>

                <div class="form-grid">
                    <div class="form-field">
                        <label class="form-field-label" for="model-pricing-override-selector">Selector</label>
                        <input id="model-pricing-override-selector" type="text" class="mono" x-model="modelPricingOverrideForm.selector" disabled>
                    </div>

                    <div class="form-field" x-show="modelPricingOverrideFormScopeOptions.length > 1">
                        <label class="form-field-label" for="model-pricing-override-scope">Scope</label>
                        <select id="model-pricing-override-scope" class="form-select" x-model="modelPricingOverrideFormScope" @change="setModelPricingOverrideScope(modelPricingOverrideFormScope)">
                            <template x-for="option in modelPricingOverrideFormScopeOptions" :key="option.value">
                                <option :value="option.value" x-text="option.label"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <p class="form-hint">
                    Currency is USD. Saved fields override model registry and config.yaml pricing for this selector; unset fields continue to inherit.
                </p>

                <div class="pricing-override-rows">
                    <template x-for="row in modelPricingOverrideRows" :key="row.id">
                        <div class="pricing-override-row">
                            <div class="form-field pricing-override-type-field">
                                <label class="form-field-label" :for="'pricing-type-' + row.id">Price Type</label>
                                <select :id="'pricing-type-' + row.id" class="form-select" x-model="row.field" data-modal-autofocus>
                                    <template x-for="option in availablePricingFieldOptions(row)" :key="option.value">
                                        <option :value="option.value" x-text="option.group + ' - ' + option.label"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="form-field pricing-override-value-field">
                                <label class="form-field-label" :for="'pricing-value-' + row.id">USD Value</label>
                                <input :id="'pricing-value-' + row.id" type="number" step="any" min="0" inputmode="decimal" x-model="row.value">
                            </div>
                            <button type="button"
                                    class="table-action-btn table-action-btn-danger table-icon-btn pricing-override-remove-row"
                                    :aria-label="'Remove ' + pricingFieldLabel(row.field)"
                                    :title="'Remove ' + pricingFieldLabel(row.field)"
                                    @click="removeModelPricingOverrideRow(row)">
                                {{template "x-icon"}}
                            </button>
                        </div>
                    </template>
                </div>

                <div class="pricing-override-row-actions">
                    <button type="button" class="pagination-btn pagination-btn-with-icon" @click="addModelPricingOverrideRow()">
                        <i data-lucide="plus" class="form-action-icon" aria-hidden="true"></i>
                        <span>Add Price</span>
                    </button>
                </div>

                <div class="pricing-override-tier-note" x-show="modelPricingOverrideFormPreservedTiers.length > 0">
                    Tiered pricing exists for this override and will be preserved. Tier editing can be added without a database migration.
                </div>

                <div class="pricing-preview">
                    <div class="pricing-preview-header">
                        <span>Price Type</span>
                        <span>USD</span>
                        <span>Source</span>
                    </div>
                    <div class="pricing-preview-row pricing-preview-row-empty" x-show="modelPricingEffectivePreviewRows().length === 0">No pricing fields set.</div>
                    <template x-for="row in modelPricingEffectivePreviewRows()" :key="row.field">
                        <div class="pricing-preview-row">
                            <span x-text="row.label"></span>
                            <span class="mono" x-text="row.value === null || row.value === undefined ? '-' : formatPriceFine(Number(row.value))"></span>
                            <span x-text="row.source"></span>
                        </div>
                    </template>
                </div>

                <p class="form-error" x-show="modelPricingOverrideError" x-text="modelPricingOverrideError" role="alert" aria-live="assertive"></p>

                <div class="form-actions">
                    <button type="button" class="pagination-btn" @click="closeModelPricingOverrideForm()">Cancel</button>
                    <button type="button" class="pagination-btn pagination-btn-danger-outline" x-show="modelPricingOverrideFormHasExistingOverride" :disabled="modelPricingOverrideSubmitting" @click="deleteModelPricingOverride()">Remove Override</button>
                    <button type="submit" class="pagination-btn pagination-btn-primary pagination-btn-with-icon model-pricing-submit-btn" :disabled="modelPricingOverrideSubmitting">
                        <i data-lucide="save" class="form-action-icon" aria-hidden="true"></i>
                        <span x-text="modelPricingOverrideSubmitting ? 'Saving...' : 'Save Pricing'"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Models Table: All / Text Generation -->
    <template x-if="(displayModels.length > 0 || modelFilter) && (activeCategory === 'all' || activeCategory === 'text_generation')">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th>Modes</th>
                    <th class="col-price">Input<br>$/MTok</th>
                    <th class="col-price">Output<br>$/MTok</th>
                    <th class="col-price" x-show="activeCategory === 'text_generation'">Cached $/MTok</th>
                    <th class="model-actions-header">{{template "model-global-action-buttons" .}}</th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Embeddings -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'embedding'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">Input<br>$/MTok</th>
                    <th class="model-actions-header">{{template "model-global-action-buttons" .}}</th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Image -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'image'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">$/Image</th>
                    <th class="model-actions-header">{{template "model-global-action-buttons" .}}</th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Audio -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'audio'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">$/Second</th>
                    <th class="col-price">$/Character</th>
                    <th class="model-actions-header">{{template "model-global-action-buttons" .}}</th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Video -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'video'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">$/Second (In)</th>
                    <th class="col-price">$/Second (Out)</th>
                    <th class="model-actions-header">{{template "model-global-action-buttons" .}}</th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <!-- Models Table: Utility -->
    <template x-if="(displayModels.length > 0 || modelFilter) && activeCategory === 'utility'">
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Model</th>
                    <th class="col-price">$/Page</th>
                    <th class="col-price">$/Request</th>
                    <th class="model-actions-header">{{template "model-global-action-buttons" .}}</th>
                </tr>
            </thead>
            {{template "model-table-body" .}}
        </table>
    </div>
    </template>

    <p class="empty-state" x-show="displayModels.length === 0 && !loading && !authError && !modelFilter && (activeCategory === 'all' || !activeCategory)">No models registered.</p>
    <p class="empty-state" x-show="displayModels.length === 0 && !loading && !authError && !modelFilter && activeCategory && activeCategory !== 'all'">No models in this category.</p>
    <p class="empty-state" x-show="displayModels.length > 0 && filteredDisplayModels.length === 0 && modelFilter">No models match your filter.</p>
</div>
</template>
{{end}}

{{define "model-global-action-buttons"}}
<div class="alias-actions-cell model-list-actions">
    <template x-if="virtualModelsAvailable">
        {{template "access-toggle" "globalScopeRow"}}
    </template>
    <button type="button" class="table-action-btn table-icon-btn"
        x-show="modelPricingOverridesAvailable"
        :class="modelPricingButtonClass(hasGlobalPricingOverride())"
        :aria-label="modelPricingButtonLabel('global model pricing', hasGlobalPricingOverride())"
        :title="modelPricingButtonLabel('global model pricing', hasGlobalPricingOverride())"
        @click="openGlobalPricingOverrideEdit()">
        {{template "dollar-icon"}}
    </button>
    <button type="button" class="table-action-btn table-icon-btn"
        x-show="virtualModelsAvailable"
        :class="modelOverrideEditButtonClass(hasGlobalModelOverride())"
        :aria-label="modelOverrideEditButtonLabel('global model access', hasGlobalModelOverride())"
        :title="modelOverrideEditButtonLabel('global model access', hasGlobalModelOverride())"
        @click="openGlobalModelOverrideEdit()">
        {{template "edit-icon"}}
    </button>
</div>
{{end}}
