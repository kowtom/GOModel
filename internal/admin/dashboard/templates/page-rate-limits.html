{{define "dashboard-page-rate-limits"}}
<!-- Rate Limits Page -->
<template x-if="page==='rate-limits'">
<div>
    <div class="page-header">
        <div>
            <div class="inline-help-section" x-data="{ open: false, copyId: 'rate-limits-help-copy', showLabel: 'Show rate limits help', hideLabel: 'Hide rate limits help', text: 'Rate limits cap requests, tokens, and in-flight concurrency for a user path subtree, a provider, or a model. Consumer (user path) breaches return 429 with Retry-After and x-ratelimit-* headers; saturated providers and models are skipped by load balancing and failover while capacity exists elsewhere. Counters are per gateway instance and reset on restart; token limits need usage tracking.' }">
                <div class="inline-help-title-row">
                    <h2>Rate Limits</h2>
                    {{template "inline-help-toggle" .}}
                </div>
                <p :id="copyId" class="inline-help-copy" x-show="open" x-transition.opacity.duration.200ms x-text="text"></p>
            </div>
        </div>
        <div class="page-header-controls">
            <button type="button"
                    class="pagination-btn pagination-btn-primary pagination-btn-with-icon"
                    x-show="rateLimitsEnabled() && rateLimitsAvailable && !authError"
                    :disabled="rateLimitFormSubmitting"
                    @click="openRateLimitForm()">
                <i data-lucide="plus" class="form-action-icon" aria-hidden="true"></i>
                <span>Create Rate Limit</span>
            </button>
        </div>
    </div>

    {{template "auth-banner" .}}

    <div class="alert alert-warning" x-show="(!rateLimitsEnabled() || !rateLimitsAvailable) && !authError">
        Rate limit management is unavailable.
    </div>
    <p class="form-error" x-show="rateLimitError && !authError && !rateLimitFormOpen" x-text="rateLimitError" role="alert" aria-live="assertive"></p>
    <div class="alert alert-success" x-show="rateLimitNotice && !rateLimitFormOpen" x-text="rateLimitNotice" role="status" aria-live="polite"></div>
    <div class="loading-state" x-show="rateLimitsLoading && !authError">
        <div class="loading-spinner"></div>
        <span>Loading rate limits...</span>
    </div>

    <div class="table-toolbar" x-show="(rateLimits.length > 0 || rateLimitFilter) && rateLimitsAvailable && !authError && !rateLimitFormOpen">
        <div class="table-toolbar-main">
            <div class="filter-input-wrap">
                <i data-lucide="search" class="filter-input-icon" aria-hidden="true"></i>
                <input type="text"
                       id="rate-limit-filter"
                       class="filter-input"
                       placeholder="Filter by subject, scope, or period..."
                       aria-label="Filter rate limits by subject, scope, or period"
                       x-model="rateLimitFilter">
            </div>
        </div>
    </div>

    {{template "rate-limit-editor" .}}

    <div class="budget-list" x-show="filteredRateLimits().length > 0 && rateLimitsAvailable && !authError">
        <template x-for="item in filteredRateLimits()" :key="rateLimitKey(item)">
            <section class="budget-row">
                <div class="budget-row-main">
                    <div class="budget-row-head">
                        <code class="budget-user-path" :title="rateLimitScopeLabel(item) + ': ' + rateLimitSubject(item)" x-text="rateLimitSubject(item)"></code>
                        <div class="budget-row-period">
                            <span class="budget-period-label"
                                  x-show="rateLimitScope(item) !== 'user_path'"
                                  :title="'Rule scope: ' + rateLimitScopeLabel(item)">
                                <i :data-lucide="rateLimitScope(item) === 'provider' ? 'server' : 'box'" class="budget-period-icon" aria-hidden="true"></i>
                                <span x-text="rateLimitScopeLabel(item)"></span>
                            </span>
                            <span class="budget-period-label">
                                <i :data-lucide="rateLimitIsConcurrent(item) ? 'activity' : 'timer'" class="budget-period-icon" aria-hidden="true"></i>
                                <span x-text="rateLimitPeriodLabel(item)"></span>
                            </span>
                        </div>
                        <div class="budget-row-controls">
                            <div class="budget-row-meta">
                                <span class="budget-source"
                                      x-text="rateLimitSourceLabel(item)"
                                      :title="rateLimitIsReadOnly(item) ? 'Declared in configuration; read-only in the dashboard' : 'Managed via dashboard or admin API'"></span>
                            </div>
                            <div class="budget-row-actions">
                                <button type="button"
                                        class="table-action-btn budget-action-btn"
                                        x-show="!rateLimitIsReadOnly(item)"
                                        title="Edit rate limit"
                                        aria-label="Edit rate limit"
                                        @click="openRateLimitForm(item)">
                                    <i data-lucide="pencil" class="budget-action-icon" aria-hidden="true"></i>
                                    <span class="budget-action-label">Edit</span>
                                </button>
                                <button type="button"
                                        class="table-action-btn budget-action-btn budget-action-btn-warning"
                                        :title="rateLimitResettingKey === rateLimitKey(item) ? 'Resetting counters' : 'Reset counters'"
                                        :aria-label="rateLimitResettingKey === rateLimitKey(item) ? 'Resetting counters' : 'Reset counters'"
                                        :disabled="rateLimitResettingKey === rateLimitKey(item)"
                                        @click="resetRateLimit(item)">
                                    <i data-lucide="rotate-ccw" class="budget-action-icon" aria-hidden="true"></i>
                                    <span class="budget-action-label" x-text="rateLimitResettingKey === rateLimitKey(item) ? 'Resetting' : 'Reset'">Reset</span>
                                </button>
                                <button type="button"
                                        class="table-action-btn table-action-btn-danger budget-action-btn"
                                        x-show="!rateLimitIsReadOnly(item)"
                                        :title="rateLimitDeletingKey === rateLimitKey(item) ? 'Deleting rate limit' : 'Delete rate limit'"
                                        :aria-label="rateLimitDeletingKey === rateLimitKey(item) ? 'Deleting rate limit' : 'Delete rate limit'"
                                        :disabled="rateLimitDeletingKey === rateLimitKey(item)"
                                        @click="deleteRateLimit(item)">
                                    <i data-lucide="trash-2" class="budget-action-icon" aria-hidden="true"></i>
                                    <span class="budget-action-label" x-text="rateLimitDeletingKey === rateLimitKey(item) ? 'Deleting' : 'Delete'">Delete</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="budget-bars">
                        <div class="budget-bar-line" x-show="rateLimitIsConcurrent(item)">
                            <div class="budget-bar-label">
                                <span>In-flight</span>
                                <span class="budget-bar-percent" x-text="rateLimitUsagePercent(item.in_flight, item.max_requests) + '%'"></span>
                            </div>
                            <div class="budget-bar-track"
                                 role="progressbar"
                                 aria-valuemin="0"
                                 aria-valuemax="100"
                                 :aria-valuenow="rateLimitUsagePercent(item.in_flight, item.max_requests)"
                                 :aria-label="'In-flight requests: ' + formatRateLimitNumber(item.in_flight) + ' of ' + formatRateLimitNumber(item.max_requests)"
                                 :style="'--budget-progress: ' + rateLimitUsagePercent(item.in_flight, item.max_requests) + '%'">
                                <div class="budget-bar-fill budget-bar-fill-usage"
                                     :class="{ 'budget-bar-fill-danger': rateLimitUsagePercent(item.in_flight, item.max_requests) >= 100 }"
                                     style="width: var(--budget-progress)"></div>
                                <span class="budget-bar-text-row">
                                    <span class="budget-bar-text budget-bar-text-center" x-text="formatRateLimitNumber(item.in_flight) + ' of ' + formatRateLimitNumber(item.max_requests) + ' in flight'"></span>
                                </span>
                            </div>
                        </div>
                        <div class="budget-bar-line" x-show="!rateLimitIsConcurrent(item) && item.max_requests">
                            <div class="budget-bar-label">
                                <span>Requests</span>
                                <span class="budget-bar-percent" x-text="rateLimitUsagePercent(item.requests_used, item.max_requests) + '%'"></span>
                            </div>
                            <div class="budget-bar-track"
                                 role="progressbar"
                                 aria-valuemin="0"
                                 aria-valuemax="100"
                                 :aria-valuenow="rateLimitUsagePercent(item.requests_used, item.max_requests)"
                                 :aria-label="'Requests used: ' + formatRateLimitNumber(item.requests_used) + ' of ' + formatRateLimitNumber(item.max_requests)"
                                 :style="'--budget-progress: ' + rateLimitUsagePercent(item.requests_used, item.max_requests) + '%'">
                                <div class="budget-bar-fill budget-bar-fill-usage"
                                     :class="{ 'budget-bar-fill-danger': rateLimitUsagePercent(item.requests_used, item.max_requests) >= 100 }"
                                     style="width: var(--budget-progress)"></div>
                                <span class="budget-bar-text-row">
                                    <span class="budget-bar-text budget-bar-text-center" x-text="formatRateLimitNumber(item.requests_used) + ' of ' + formatRateLimitNumber(item.max_requests) + ' requests'"></span>
                                    <span class="budget-bar-text budget-bar-text-end" x-text="formatRateLimitNumber(item.requests_remaining) + ' left'"></span>
                                </span>
                            </div>
                        </div>
                        <div class="budget-bar-line" x-show="!rateLimitIsConcurrent(item) && item.max_tokens">
                            <div class="budget-bar-label">
                                <span>Tokens</span>
                                <span class="budget-bar-percent" x-text="rateLimitUsagePercent(item.tokens_used, item.max_tokens) + '%'"></span>
                            </div>
                            <div class="budget-bar-track"
                                 role="progressbar"
                                 aria-valuemin="0"
                                 aria-valuemax="100"
                                 :aria-valuenow="rateLimitUsagePercent(item.tokens_used, item.max_tokens)"
                                 :aria-label="'Tokens used: ' + formatRateLimitNumber(item.tokens_used) + ' of ' + formatRateLimitNumber(item.max_tokens)"
                                 :style="'--budget-progress: ' + rateLimitUsagePercent(item.tokens_used, item.max_tokens) + '%'">
                                <div class="budget-bar-fill budget-bar-fill-usage"
                                     :class="{ 'budget-bar-fill-danger': rateLimitUsagePercent(item.tokens_used, item.max_tokens) >= 100 }"
                                     style="width: var(--budget-progress)"></div>
                                <span class="budget-bar-text-row">
                                    <span class="budget-bar-text budget-bar-text-center" x-text="formatRateLimitNumber(item.tokens_used) + ' of ' + formatRateLimitNumber(item.max_tokens) + ' tokens'"></span>
                                    <span class="budget-bar-text budget-bar-text-end" x-text="formatRateLimitNumber(item.tokens_remaining) + ' left'"></span>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </template>
    </div>

    <p class="empty-state"
       x-show="rateLimits.length === 0 && !rateLimitFilter && !rateLimitsLoading && !authError && !rateLimitError && rateLimitsAvailable && rateLimitsEnabled()">
        No rate limits configured yet.
    </p>
    <p class="empty-state"
       x-show="rateLimits.length > 0 && filteredRateLimits().length === 0 && rateLimitFilter && !rateLimitsLoading && !authError && !rateLimitError && rateLimitsAvailable && rateLimitsEnabled()">
        No rate limits match your filter.
    </p>
</div>
</template>
{{end}}
