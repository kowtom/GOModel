name: Helm Chart CI

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - "deploy/local/**"
      - ".github/workflows/helm-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "helm/**"
      - "deploy/local/**"
      - ".github/workflows/helm-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    name: Lint and template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Helm lint (strict)
        run: helm lint --strict helm

      # Render every example value set to catch templating regressions that lint misses.
      - name: Helm template (all value sets)
        run: |
          set -euo pipefail
          helm template ci helm > /dev/null
          for f in helm/ci/*-values.yaml; do
            echo "Rendering with $f"
            helm template ci helm -f "$f" > /dev/null
          done

      - name: Helm template (local dev values)
        run: helm template ci helm -f deploy/local/values.yaml > /dev/null

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Run chart-testing (lint)
        run: ct lint --charts helm --validate-maintainers=false --target-branch ${{ github.event.repository.default_branch }}

  kubeconform:
    name: Validate against Kubernetes schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      # ServiceMonitor is a CRD, so skip resources kubeconform can't resolve.
      - name: Render and validate manifests
        run: |
          set -euo pipefail
          for f in helm/ci/*-values.yaml deploy/local/values.yaml; do
            echo "Validating manifests rendered with $f"
            helm template ci helm -f "$f" \
              | kubeconform -strict -ignore-missing-schemas -summary
          done

      - name: Validate local dev dependency manifests
        run: kubeconform -strict -ignore-missing-schemas -summary deploy/local/deps.yaml
