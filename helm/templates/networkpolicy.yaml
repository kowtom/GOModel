{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "gomodel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gomodel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gomodel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow inbound traffic to the HTTP port from anywhere (front by an Ingress/LB).
    - ports:
        - port: http
          protocol: TCP
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # DNS resolution.
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Outbound HTTPS to provider APIs and external datastores.
    - to: []
      ports:
        - port: 443
          protocol: TCP
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
