{{- if eq (include "gomodel.createSecret" .) "true" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gomodel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gomodel.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.masterKey }}
  GOMODEL_MASTER_KEY: {{ .Values.secrets.masterKey | quote }}
  {{- end }}
  {{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
