{{- if include "gomodel.persistent" . -}}
{{- include "gomodel.validate" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "gomodel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gomodel.labels" . | nindent 4 }}
spec:
  # SQLite is a single-writer store: exactly one replica.
  replicas: 1
  serviceName: {{ include "gomodel.fullname" . }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "gomodel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "gomodel.podAnnotations" . | nindent 8 }}
      labels:
        {{- include "gomodel.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "gomodel.podSpec" . | nindent 6 }}
  {{- if not .Values.persistence.existingClaim }}
  volumeClaimTemplates:
    - metadata:
        name: data
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
{{- end }}
