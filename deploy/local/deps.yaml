# In-cluster development dependencies for GoModel: Redis, PostgreSQL and MongoDB.
# These mirror the images and settings from docker-compose.yaml and are deployed
# by Skaffold alongside the app. Data is ephemeral (emptyDir) — this is a dev
# convenience, not a durable store.
#
# Service DNS names (used by deploy/local/values.yaml):
#   redis://redis:6379
#   postgres://gomodel:gomodel@postgres:5432/gomodel
#   mongodb://mongodb:27017/gomodel
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
    app.kubernetes.io/part-of: gomodel-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
    app.kubernetes.io/part-of: gomodel-dev
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
    app.kubernetes.io/part-of: gomodel-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          env:
            - name: POSTGRES_USER
              value: gomodel
            - name: POSTGRES_PASSWORD
              value: gomodel
            - name: POSTGRES_DB
              value: gomodel
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gomodel", "-d", "gomodel"]
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
    app.kubernetes.io/part-of: gomodel-dev
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app: mongodb
    app.kubernetes.io/part-of: gomodel-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:8
          args: ["--replSet", "rs0", "--bind_ip_all"]
          ports:
            - containerPort: 27017
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - >-
                  try { rs.status() } catch(e) {
                  rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) };
                  if (!db.hello().isWritablePrimary) { quit(1) }
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
    app.kubernetes.io/part-of: gomodel-dev
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
